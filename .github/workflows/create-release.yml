name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'minor'
        type: choice
        options:
          - patch
          - minor
          - major
      added:
        description: 'New features — separate multiple items with ;'
        required: false
        type: string
      changed:
        description: 'Changes to existing functionality — separate multiple items with ;'
        required: false
        type: string
      fixed:
        description: 'Bug fixes — separate multiple items with ;'
        required: false
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch last merged PR body
        id: pr_body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(gh pr list --state merged --base main --limit 1 --json body --jq '.[0].body // ""')
          echo "PR_BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$PR_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Bump version
        id: version_bump
        run: |
          NEW_VERSION=$(npm version ${{ github.event.inputs.version_type }} --no-git-tag-version)
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumped from ${{ steps.current_version.outputs.VERSION }} to ${NEW_VERSION}"

      - name: Update changelog and build release notes
        env:
          NEW_VERSION: ${{ steps.version_bump.outputs.NEW_VERSION }}
          ADDED: ${{ github.event.inputs.added }}
          CHANGED: ${{ github.event.inputs.changed }}
          FIXED: ${{ github.event.inputs.fixed }}
          PR_BODY: ${{ steps.pr_body.outputs.PR_BODY }}
        run: |
          node << 'NODESCRIPT'
          const fs = require('fs');

          const version = process.env.NEW_VERSION.replace('v', '');
          const date = new Date().toISOString().split('T')[0];
          const prBody = process.env.PR_BODY || '';

          // Parse a ### Section from the PR body into a semicolon-separated string
          function parsePrSection(body, sectionName) {
            const regex = new RegExp(`###\\s*${sectionName}\\s*\\n([\\s\\S]*?)(?=\\n###|$)`, 'i');
            const match = body.match(regex);
            if (!match) return '';
            return match[1].trim()
              .split('\n')
              .map(l => l.replace(/^[-*]\s*/, '').trim())
              .filter(Boolean)
              .join(';');
          }

          // Manual inputs take priority; fall back to PR body sections
          const added   = process.env.ADDED   || parsePrSection(prBody, 'Added');
          const changed = process.env.CHANGED || parsePrSection(prBody, 'Changed');
          const fixed   = process.env.FIXED   || parsePrSection(prBody, 'Fixed');

          function buildSection(title, input) {
            if (!input.trim()) return '';
            const items = input.split(';').map(s => s.trim()).filter(Boolean);
            if (!items.length) return '';
            return `\n### ${title}\n` + items.map(i => `- ${i}`).join('\n') + '\n';
          }

          const sections =
            buildSection('Added',   added) +
            buildSection('Changed', changed) +
            buildSection('Fixed',   fixed);

          const newEntry = `## [${version}] - ${date}\n${sections}`;

          // Insert the new entry before the first existing version block,
          // unless an entry for this version is already present (manually pre-written).
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          let releaseBody;

          if (changelog.includes(`## [${version}]`)) {
            console.log(`CHANGELOG.md already contains [${version}] — skipping auto-insert.`);
            // Extract the existing entry to use in the GitHub Release body
            const entryStart = changelog.indexOf(`## [${version}]`);
            const nextEntry  = changelog.indexOf('\n## [', entryStart + 1);
            const entryText  = nextEntry === -1
              ? changelog.slice(entryStart).trim()
              : changelog.slice(entryStart, nextEntry).trim();
            releaseBody = entryText.split('\n').slice(1).join('\n').trim();
          } else {
            if (!added.trim() && !changed.trim() && !fixed.trim()) {
              console.warn("WARNING: No release notes found in manual inputs or PR body — changelog entry will be empty.");
            }
            const insertAt = changelog.indexOf('\n## [');
            const updated  = insertAt === -1
              ? changelog.trimEnd() + '\n\n' + newEntry + '\n'
              : changelog.slice(0, insertAt) + '\n\n' + newEntry + '\n' + changelog.slice(insertAt + 1);
            fs.writeFileSync('CHANGELOG.md', updated);
            console.log(`CHANGELOG.md updated with [${version}] entry.`);
            releaseBody = sections.trim();
          }

          // Generate GitHub Release body
          const releaseNotes = [
            `## What's New in v${version}`,
            '',
            releaseBody,
            '',
            '---',
            '',
            'See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the full version history.',
            '',
            '## Installation',
            '',
            '```bash',
            'npx al-go-mcp-server',
            '```',
            '',
            'Or install a specific version:',
            '',
            '```bash',
            `npm install -g al-go-mcp-server@${version}`,
            '```',
          ].join('\n');
          fs.writeFileSync('release_notes.md', releaseNotes);
          console.log('release_notes.md generated.');
          NODESCRIPT

      - name: Commit version bump and changelog
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version_bump.outputs.NEW_VERSION }}"

      - name: Create and push tag
        run: |
          git tag ${{ steps.version_bump.outputs.NEW_VERSION }}
          git push origin main
          git push origin ${{ steps.version_bump.outputs.NEW_VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_bump.outputs.NEW_VERSION }}
          name: Release ${{ steps.version_bump.outputs.NEW_VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
